# 週次レポート用の保有銘柄定義
#
# 出典: 楽天証券「保有商品詳細」スクリーンショット実値
#   - 初版: 2026/6/13（CLAUDE.md 基準スナップショット）
#   - 更新: 2026/7/23 — MDT/QCOM 新規、FANG+ 積立増、USD現金をほぼ投入
# CLAUDE.md の基準スナップショットは改変しない。ここはその機械可読な写しであり、
# 数量・取得単価が変わったときだけ更新する（週次の株価は毎回 API で取り直す）。
#
# 注意: 保有構成は自動取得できない（楽天への自動ログインは実装しない方針）。
# 売買したらこのファイルを更新するか、MS2 RSS スナップショットを設定すること。
# 設定手順は config/rakuten.yaml のコメント参照。
#
# quote_symbol: 株価取得に使うティッカー。null なら価格取得をスキップし、
#               last_known_price を使う（投信など yfinance に無い銘柄）。

base_currency: JPY

