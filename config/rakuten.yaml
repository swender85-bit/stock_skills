# 楽天証券 MarketSpeed II RSS 連携設定
#
# ■ なぜログイン自動化しないのか
# 無人実行のために証券口座の資格情報を保存するのはリスクが高く、2FAも突破できず、
# 規約上も危うい。代わりに「あなたがログイン済みのMS2がExcelに書いた値」を読む。
# 資格情報はこのリポジトリに一切置かない。
#
# ■ セットアップ（初回だけ）
#
# テンプレートは自動生成できる。手で表を作る必要はない:
#
#     pip install openpyxl
#     python scripts/make_rakuten_template.py
#     → output/楽天保有.xlsx （現在の保有 + RSS 関数入り）
#
# 1. MarketSpeed II を起動してログインし、RSS を有効化する
# 2. 生成された xlsx を Excel で開く
# 3. 値が入ったら、そのまま上書き保存する
#    （openpyxl は数式ではなく Excel が保存した計算済みの値を読むため、保存が必要）
# 4. 下の snapshot_path に、そのブックの絶対パスを書く
# 5. 毎週金曜の引け後〜土曜朝までに開いて更新・保存しておく
#
# ■ 何が自動で、何が手動か（重要）
#
# | 対象                        | 数量・口座        | 現在値            |
# |-----------------------------|-------------------|-------------------|
# | 国内株 (2802/9843/2737 等)  | ✅ RssPositionList | ✅ RssMarket       |
# | 米国株 (SOXL/TECL/MDT 等)   | ❌ 手動            | ⚠️ yfinance が補完 |
# | 投信 (FANG+)                | ❌ 手動            | ⚠️ 基準価額を手動  |
#
# RssPositionList は楽天公式ヘルプ上「国内株式の保有銘柄一覧」であり、
# 外国株式用の関数は提供されていない。つまり**米国株を売買したら手で直すしかない**。
# 生成される xlsx の「国内RSS」シートに RssPositionList の出力が入るので、
# 国内株についてはそれを見て「保有」シートを直せばよい。
#
# 現在値が空欄の行は、数量・取得単価だけ楽天の実データを使い、
# 株価は yfinance で自動補完する（レポートに price_source が明記される）。
#
# 鮮度が max_age_hours を超えると、レポート冒頭に警告が出る。
# 古いファイルを黙って使って「先週の終値」のつもりで先々週を見る事故を防ぐため。

snapshot_path: null   # 例: "C:/Users/swend/Documents/楽天保有.xlsx"

# スナップショットが何時間前まで許容できるか（超えると警告）
max_age_hours: 72
